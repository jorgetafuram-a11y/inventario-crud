{% extends 'base.html' %}
{% block title %}Usuarios{% endblock %}
{% block content %}
<div class="actions-row">
    <h1>Usuarios</h1>
</div>

<section class="card">
    <h3>Crear usuario</h3>
    <form method="post" class="form-grid">
        <label>Usuario</label>
        <input type="text" name="username" required>

        <label>Contrasena</label>
        <input type="password" name="password" required>

        <label>Rol</label>
        <select name="role" required>
            <option value="personal">Personal</option>
            <option value="super_admin">Super Admin</option>
        </select>

        <button type="submit">Crear</button>
    </form>
</section>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Rol</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.username }}</td>
                <td>{{ user.role }}</td>
                <td>
                    <form method="post" action="{{ url_for('user_generate_recovery_code', user_id=user.id) }}" class="inline-delete" onsubmit="return confirm('Generar codigo de recuperacion para este usuario?');">
                        <button type="submit" class="small">Recuperar clave</button>
                    </form>
                    {% if user.id != current_user.id %}
                    <form method="post" action="{{ url_for('user_delete', user_id=user.id) }}" class="inline-delete" onsubmit="return confirm('Estas seguro de eliminar este usuario?');">
                        <button type="submit" class="small danger">Eliminar</button>
                    </form>
                    {% else %}
                    <span>-</span>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
