{% extends 'base.html' %}
{% block title %}Recuperar contraseña{% endblock %}
{% block content %}
<section class="card narrow">
    <h1>Recuperar contraseña</h1>
    <p class="subtitle">Ingresa el codigo de recuperacion</p>

    <form method="post" class="form-grid">
        <label>Codigo de recuperacion</label>
        <input type="text" name="code" value="{{ code }}" maxlength="8" pattern="[0-9]{1,8}" required>

        <label>Nueva contraseña</label>
        <input type="password" name="password" minlength="8" required>

        <label>Confirmar contraseña</label>
        <input type="password" name="password_confirm" minlength="8" required>

        <button type="submit">Actualizar contraseña</button>
    </form>
</section>
{% endblock %}
